apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: archplatform-ingress
  namespace: archplatform
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - api.archplatform.com
      secretName: archplatform-tls
  rules:
    - host: api.archplatform.com
      http:
        paths:
          - path: /api/v1/users
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8081
          - path: /api/v1/projects
            pathType: Prefix
            backend:
              service:
                name: project-service
                port:
                  number: 8082
          - path: /api/v1/properties
            pathType: Prefix
            backend:
              service:
                name: property-service
                port:
                  number: 8083
          - path: /api/v1/versions
            pathType: Prefix
            backend:
              service:
                name: version-service
                port:
                  number: 8084
          - path: /api/v1/search
            pathType: Prefix
            backend:
              service:
                name: search-service
                port:
                  number: 8089
          - path: /api/v1/collaboration
            pathType: Prefix
            backend:
              service:
                name: collaboration-service
                port:
                  number: 8081
          - path: /api/v1/geometry
            pathType: Prefix
            backend:
              service:
                name: geometry-service
                port:
                  number: 8082
          - path: /api/v1/files
            pathType: Prefix
            backend:
              service:
                name: file-service
                port:
                  number: 8086
          - path: /api/v1/notifications
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 8087
          - path: /api/v1/analytics
            pathType: Prefix
            backend:
              service:
                name: analytics-service
                port:
                  number: 8090
          - path: /api/v1/scripts
            pathType: Prefix
            backend:
              service:
                name: script-service
                port:
                  number: 8085
