---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-service
  namespace: archplatform
  labels:
    app: file-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: file-service
  template:
    metadata:
      labels:
        app: file-service
    spec:
      containers:
        - name: file-service
          image: archplatform/file-service:latest
          ports:
            - containerPort: 8086
              name: http
          envFrom:
            - configMapRef:
                name: archplatform-config
            - secretRef:
                name: archplatform-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - name: temp-storage
              mountPath: /tmp
      volumes:
        - name: temp-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: file-service
  namespace: archplatform
spec:
  selector:
    app: file-service
  ports:
    - port: 8086
      targetPort: 8086
      name: http
  type: ClusterIP
