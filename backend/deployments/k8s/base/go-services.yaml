apiVersion: apps/v1
kind: Deployment
metadata:
  name: collaboration-service
  namespace: archplatform
  labels:
    app: collaboration-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: collaboration-service
  template:
    metadata:
      labels:
        app: collaboration-service
    spec:
      containers:
        - name: collaboration-service
          image: archplatform/collaboration-service:latest
          ports:
            - containerPort: 8081
              name: http
            - containerPort: 50051
              name: grpc
          envFrom:
            - configMapRef:
                name: archplatform-config
            - secretRef:
                name: archplatform-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: collaboration-service
  namespace: archplatform
spec:
  selector:
    app: collaboration-service
  ports:
    - port: 8081
      targetPort: 8081
      name: http
    - port: 50051
      targetPort: 50051
      name: grpc
  type: ClusterIP
---
apiVersion: apps/v1
