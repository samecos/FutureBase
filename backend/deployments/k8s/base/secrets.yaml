apiVersion: v1
kind: Secret
metadata:
  name: archplatform-secrets
  namespace: archplatform
type: Opaque
stringData:
  # Database
  DB_USER: "postgres"
  DB_PASSWORD: "change-me-in-production"
  
  # JWT
  JWT_SECRET: "change-me-in-production-min-32-chars"
  
  # MinIO
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "change-me-in-production"
  
  # Redis (if password protected)
  REDIS_PASSWORD: ""
  
  # SMTP (for notifications)
  SMTP_USERNAME: ""
  SMTP_PASSWORD: ""
