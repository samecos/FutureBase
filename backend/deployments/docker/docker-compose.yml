version: "3.8"

services:
  # ============================================
  # Infrastructure Services
  # ============================================
  
  postgres:
    image: postgis/postgis:15-3.4
    container_name: archdesign-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: archdesign_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: archdesign-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: archdesign-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: archdesign-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  nats:
    image: nats:2.10-alpine
    container_name: archdesign-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: "--js --server_name n1"

  minio:
    image: minio/minio:latest
    container_name: archdesign-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: archdesign-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  temporal:
    image: temporalio/auto-setup:1.22.0
    container_name: archdesign-temporal
    depends_on:
      - postgres
      - elasticsearch
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml

  temporal-ui:
    image: temporalio/ui:2.21.0
    container_name: archdesign-temporal-ui
    depends_on:
      - temporal
    ports:
      - "8088:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000

  # ============================================
  # Go Services
  # ============================================
  
  collaboration-service:
    build:
      context: ../../services/collaboration-service
      dockerfile: Dockerfile
    container_name: archdesign-collaboration-service
    ports:
      - "50051:50051"
      - "8081:8081"
    environment:
      - SERVICE_NAME=collaboration-service
      - GRPC_PORT=50051
      - HTTP_PORT=8081
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/archdesign_platform?sslmode=disable
      - REDIS_URL=redis:6379
      - NATS_URL=nats://nats:4222
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - postgres
      - redis
      - nats
      - kafka

  geometry-service:
    build:
      context: ../../services/geometry-service
      dockerfile: Dockerfile
    container_name: archdesign-geometry-service
    ports:
      - "50052:50052"
      - "8082:8082"
    environment:
      - SERVICE_NAME=geometry-service
      - GRPC_PORT=50052
      - HTTP_PORT=8082
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/archdesign_geometry?sslmode=disable
      - REDIS_URL=redis:6379
    depends_on:
      - postgres
      - redis

  script-service:
    build:
      context: ../../services/script-service
      dockerfile: Dockerfile
    container_name: archdesign-script-service
    ports:
      - "50053:50053"
      - "8083:8083"
    environment:
      - SERVICE_NAME=script-service
      - GRPC_PORT=50053
      - HTTP_PORT=8083
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/archdesign_platform?sslmode=disable
      - REDIS_URL=redis:6379
      - TEMPORAL_HOST=temporal:7233
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      - postgres
      - redis
      - temporal
      - minio

  file-service:
    build:
      context: ../../services/file-service
      dockerfile: Dockerfile
    container_name: archdesign-file-service
    ports:
      - "50054:50054"
      - "8084:8084"
    environment:
      - SERVICE_NAME=file-service
      - GRPC_PORT=50054
      - HTTP_PORT=8084
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/archdesign_platform?sslmode=disable
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    depends_on:
      - postgres
      - minio

  notification-service:
    build:
      context: ../../services/notification-service
      dockerfile: Dockerfile
    container_name: archdesign-notification-service
    ports:
      - "50055:50055"
      - "8085:8085"
    environment:
      - SERVICE_NAME=notification-service
      - GRPC_PORT=50055
      - HTTP_PORT=8085
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/archdesign_platform?sslmode=disable
      - REDIS_URL=redis:6379
      - NATS_URL=nats://nats:4222
    depends_on:
      - postgres
      - redis
      - nats

  # ============================================
  # Java Services
  # ============================================
  
  user-service:
    build:
      context: ../../services/user-service
      dockerfile: Dockerfile
    container_name: archdesign-user-service
    ports:
      - "8086:8086"
      - "50056:50056"
    environment:
      - SPRING_APPLICATION_NAME=user-service
      - SERVER_PORT=8086
      - GRPC_PORT=50056
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/archdesign_platform
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
    depends_on:
      - postgres
      - redis

  project-service:
    build:
      context: ../../services/project-service
      dockerfile: Dockerfile
    container_name: archdesign-project-service
    ports:
      - "8087:8087"
      - "50057:50057"
    environment:
      - SPRING_APPLICATION_NAME=project-service
      - SERVER_PORT=8087
      - GRPC_PORT=50057
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/archdesign_platform
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    depends_on:
      - postgres
      - kafka

  property-service:
    build:
      context: ../../services/property-service
      dockerfile: Dockerfile
    container_name: archdesign-property-service
    ports:
      - "8088:8088"
      - "50058:50058"
    environment:
      - SPRING_APPLICATION_NAME=property-service
      - SERVER_PORT=8088
      - GRPC_PORT=50058
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/archdesign_platform
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - postgres
      - kafka

  version-service:
    build:
      context: ../../services/version-service
      dockerfile: Dockerfile
    container_name: archdesign-version-service
    ports:
      - "8089:8089"
      - "50059:50059"
    environment:
      - SPRING_APPLICATION_NAME=version-service
      - SERVER_PORT=8089
      - GRPC_PORT=50059
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/archdesign_platform
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      - postgres
      - minio

  # ============================================
  # Gateway
  # ============================================
  
  kong:
    image: kong:3.5
    container_name: archdesign-kong
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/kong/declarative/kong.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_PLUGINS=bundled
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
      - "8444:8444"
    volumes:
      - ./kong:/kong/declarative

volumes:
  postgres_data:
  redis_data:
  minio_data:
  elasticsearch_data:
