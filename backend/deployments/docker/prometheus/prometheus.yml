global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Java Services
  - job_name: 'user-service'
    metrics_path: '/api/v1/actuator/prometheus'
    static_configs:
      - targets: ['user-service:8081']

  - job_name: 'project-service'
    metrics_path: '/api/v1/actuator/prometheus'
    static_configs:
      - targets: ['project-service:8082']

  - job_name: 'property-service'
    metrics_path: '/api/v1/actuator/prometheus'
    static_configs:
      - targets: ['property-service:8083']

  - job_name: 'version-service'
    metrics_path: '/api/v1/actuator/prometheus'
    static_configs:
      - targets: ['version-service:8084']

  - job_name: 'search-service'
    metrics_path: '/api/v1/actuator/prometheus'
    static_configs:
      - targets: ['search-service:8089']

  # Go Services
  - job_name: 'collaboration-service'
    static_configs:
      - targets: ['collaboration-service:8081']

  - job_name: 'geometry-service'
    static_configs:
      - targets: ['geometry-service:8082']

  - job_name: 'script-service'
    static_configs:
      - targets: ['script-service:8085']

  - job_name: 'file-service'
    static_configs:
      - targets: ['file-service:8086']

  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:8087']

  - job_name: 'analytics-service'
    static_configs:
      - targets: ['analytics-service:8090']

  # Infrastructure
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']
