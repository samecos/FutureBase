# Test configuration for Project Service
spring:
  application:
    name: project-service-test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  # Disable external services
  redis:
    enabled: false

  kafka:
    enabled: false

# Logging
logging:
  level:
    com.archplatform.project: DEBUG
    org.springframework.web: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Service URLs (mocked in tests)
services:
  user:
    url: http://localhost:8081
  notification:
    url: http://localhost:8087

# Server
server:
  port: 0

# JWT (for test token validation)
jwt:
  secret: test-secret-key-for-integration-tests-only
