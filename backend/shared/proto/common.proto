syntax = "proto3";

package archdesign.common.v1;

option go_package = "github.com/archplatform/backend/shared/proto/common;commonpb";
option java_multiple_files = true;
option java_package = "com.archdesign.common.proto";
option java_outer_classname = "CommonProto";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

// ============================================
// Common Types
// ============================================

message UUID {
  string value = 1;
}

message Empty {
}

message PaginationRequest {
  int32 page = 1;
  int32 page_size = 2;
  string sort_by = 3;
  bool sort_desc = 4;
}

message PaginationResponse {
  int32 page = 1;
  int32 page_size = 2;
  int32 total_pages = 3;
  int64 total_count = 4;
  bool has_next = 5;
  bool has_previous = 6;
}

message TimeRange {
  google.protobuf.Timestamp start = 1;
  google.protobuf.Timestamp end = 2;
}

// ============================================
// Error Types
// ============================================

message ErrorDetail {
  string field = 1;
  string code = 2;
  string message = 3;
}

message ErrorResponse {
  string code = 1;
  string message = 2;
  repeated ErrorDetail details = 3;
  string request_id = 4;
  google.protobuf.Timestamp timestamp = 5;
}

// ============================================
// Tenant & User Context
// ============================================

message TenantContext {
  string tenant_id = 1;
  string tenant_name = 2;
  string plan_type = 3;
}

message UserContext {
  string user_id = 1;
  string username = 2;
  string email = 3;
  repeated string roles = 4;
  repeated string permissions = 5;
}

message RequestContext {
  string request_id = 1;
  TenantContext tenant = 2;
  UserContext user = 3;
  string client_ip = 4;
  string user_agent = 5;
  google.protobuf.Timestamp timestamp = 6;
}

// ============================================
// Audit Info
// ============================================

message AuditInfo {
  string created_by = 1;
  google.protobuf.Timestamp created_at = 2;
  string updated_by = 3;
  google.protobuf.Timestamp updated_at = 4;
  string deleted_by = 5;
  google.protobuf.Timestamp deleted_at = 6;
  int32 version = 7;
}

// ============================================
// Status Enums
// ============================================

enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_ACTIVE = 1;
  STATUS_INACTIVE = 2;
  STATUS_PENDING = 3;
  STATUS_SUSPENDED = 4;
  STATUS_DELETED = 5;
}

enum Permission {
  PERMISSION_UNSPECIFIED = 0;
  PERMISSION_READ = 1;
  PERMISSION_WRITE = 2;
  PERMISSION_DELETE = 3;
  PERMISSION_ADMIN = 4;
  PERMISSION_OWNER = 5;
}
