syntax = "proto3";

package archdesign.user.v1;

option go_package = "github.com/archplatform/backend/shared/proto/user;userpb";
option java_multiple_files = true;
option java_package = "com.archdesign.user.proto";
option java_outer_classname = "UserProto";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "common.proto";

// ============================================
// User Service
// ============================================

service UserService {
  // User CRUD
  rpc CreateUser(CreateUserRequest) returns (User);
  rpc GetUser(GetUserRequest) returns (User);
  rpc UpdateUser(UpdateUserRequest) returns (User);
  rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);

  // Authentication
  rpc Authenticate(AuthenticateRequest) returns (AuthenticateResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (AuthenticateResponse);
  rpc Logout(LogoutRequest) returns (google.protobuf.Empty);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);

  // Password Management
  rpc ChangePassword(ChangePasswordRequest) returns (google.protobuf.Empty);
  rpc RequestPasswordReset(RequestPasswordResetRequest) returns (google.protobuf.Empty);
  rpc ResetPassword(ResetPasswordRequest) returns (google.protobuf.Empty);

  // MFA
  rpc SetupMFA(SetupMFARequest) returns (SetupMFAResponse);
  rpc VerifyMFA(VerifyMFARequest) returns (google.protobuf.Empty);
  rpc DisableMFA(DisableMFARequest) returns (google.protobuf.Empty);

  // Profile
  rpc GetProfile(GetProfileRequest) returns (UserProfile);
  rpc UpdateProfile(UpdateProfileRequest) returns (UserProfile);
  rpc UploadAvatar(UploadAvatarRequest) returns (UploadAvatarResponse);

  // User Sessions
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc RevokeSession(RevokeSessionRequest) returns (google.protobuf.Empty);
  rpc RevokeAllSessions(RevokeAllSessionsRequest) returns (google.protobuf.Empty);
}

// ============================================
// User Messages
// ============================================

message User {
  string id = 1;
  string tenant_id = 2;
  string email = 3;
  string username = 4;
  string first_name = 5;
  string last_name = 6;
  string avatar_url = 7;
  string phone = 8;
  UserRole role = 9;
  UserStatus status = 10;
  bool email_verified = 11;
  bool mfa_enabled = 12;
  google.protobuf.Timestamp last_login_at = 13;
  int32 login_count = 14;
  google.protobuf.Struct preferences = 15;
  AuditInfo audit = 16;
}

message UserProfile {
  string id = 1;
  string email = 2;
  string username = 3;
  string first_name = 4;
  string last_name = 5;
  string full_name = 6;
  string avatar_url = 7;
  string phone = 8;
  string bio = 9;
  string timezone = 10;
  string language = 11;
  google.protobuf.Struct preferences = 12;
  repeated string teams = 13;
  repeated string projects = 14;
}

// ============================================
// Request/Response Messages
// ============================================

message CreateUserRequest {
  string tenant_id = 1;
  string email = 2;
  string username = 3;
  string password = 4;
  string first_name = 5;
  string last_name = 6;
  UserRole role = 7;
  google.protobuf.Struct metadata = 8;
}

message GetUserRequest {
  string id = 1;
  string tenant_id = 2;
}

message UpdateUserRequest {
  string id = 1;
  string tenant_id = 2;
  string first_name = 3;
  string last_name = 4;
  string phone = 5;
  UserRole role = 6;
  UserStatus status = 7;
  google.protobuf.Struct preferences = 8;
}

message DeleteUserRequest {
  string id = 1;
  string tenant_id = 2;
  bool permanent = 3;
}

message ListUsersRequest {
  string tenant_id = 1;
  string search = 2;
  repeated UserRole roles = 3;
  UserStatus status = 4;
  archdesign.common.v1.PaginationRequest pagination = 5;
}

message ListUsersResponse {
  repeated User users = 1;
  archdesign.common.v1.PaginationResponse pagination = 2;
}

// ============================================
// Authentication Messages
// ============================================

message AuthenticateRequest {
  oneof credential {
    PasswordCredential password = 1;
    TokenCredential token = 2;
    ApiKeyCredential api_key = 3;
  }
  string device_info = 4;
  string ip_address = 5;
}

message PasswordCredential {
  string username_or_email = 1;
  string password = 2;
  string mfa_code = 3;
}

message TokenCredential {
  string refresh_token = 1;
}

message ApiKeyCredential {
  string api_key = 1;
}

message AuthenticateResponse {
  User user = 1;
  string access_token = 2;
  string refresh_token = 3;
  int64 expires_in = 4;
  string token_type = 5;
  repeated string scopes = 6;
  bool mfa_required = 7;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message LogoutRequest {
  string token = 1;
  bool all_devices = 2;
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool valid = 1;
  User user = 2;
  repeated string scopes = 3;
  int64 expires_in = 4;
}

// ============================================
// Password Messages
// ============================================

message ChangePasswordRequest {
  string user_id = 1;
  string old_password = 2;
  string new_password = 3;
}

message RequestPasswordResetRequest {
  string email = 1;
}

message ResetPasswordRequest {
  string token = 1;
  string new_password = 2;
}

// ============================================
// MFA Messages
// ============================================

message SetupMFARequest {
  string user_id = 1;
  MFAType type = 2;
}

message SetupMFAResponse {
  string secret = 1;
  string qr_code_url = 2;
  repeated string backup_codes = 3;
}

message VerifyMFARequest {
  string user_id = 1;
  string code = 2;
  MFAType type = 3;
}

message DisableMFARequest {
  string user_id = 1;
  string password = 2;
  string code = 3;
}

// ============================================
// Profile Messages
// ============================================

message GetProfileRequest {
  string user_id = 1;
}

message UpdateProfileRequest {
  string user_id = 1;
  string first_name = 2;
  string last_name = 3;
  string phone = 4;
  string bio = 5;
  string timezone = 6;
  string language = 7;
  google.protobuf.Struct preferences = 8;
}

message UploadAvatarRequest {
  string user_id = 1;
  bytes image_data = 2;
  string content_type = 3;
}

message UploadAvatarResponse {
  string avatar_url = 1;
}

// ============================================
// Session Messages
// ============================================

message UserSession {
  string id = 1;
  string user_id = 2;
  string ip_address = 3;
  string user_agent = 4;
  string device_info = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp last_activity_at = 7;
  google.protobuf.Timestamp expires_at = 8;
  bool is_current = 9;
}

message ListSessionsRequest {
  string user_id = 1;
  bool active_only = 2;
}

message ListSessionsResponse {
  repeated UserSession sessions = 1;
}

message RevokeSessionRequest {
  string user_id = 1;
  string session_id = 2;
}

message RevokeAllSessionsRequest {
  string user_id = 1;
  bool except_current = 2;
}

// ============================================
// Enums
// ============================================

enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  USER_ROLE_SUPER_ADMIN = 1;
  USER_ROLE_ADMIN = 2;
  USER_ROLE_MANAGER = 3;
  USER_ROLE_DESIGNER = 4;
  USER_ROLE_VIEWER = 5;
  USER_ROLE_MEMBER = 6;
}

enum UserStatus {
  USER_STATUS_UNSPECIFIED = 0;
  USER_STATUS_ACTIVE = 1;
  USER_STATUS_INACTIVE = 2;
  USER_STATUS_SUSPENDED = 3;
  USER_STATUS_PENDING = 4;
}

enum MFAType {
  MFA_TYPE_UNSPECIFIED = 0;
  MFA_TYPE_TOTP = 1;
  MFA_TYPE_SMS = 2;
  MFA_TYPE_EMAIL = 3;
  MFA_TYPE_WEBAUTHN = 4;
}

// Audit Info
message AuditInfo {
  string created_by = 1;
  google.protobuf.Timestamp created_at = 2;
  string updated_by = 3;
  google.protobuf.Timestamp updated_at = 4;
  int32 version = 5;
}
